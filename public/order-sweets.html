<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب حلويات - Sweet Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-birthday-cake"></i> محل الحلويات</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="/order-cake">كيك</a></li>
                    <li class="nav-item"><a class="nav-link" href="/order-buffet">بوفيه</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/order-sweets">حلويات</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="text-center mb-5">🍪 طلب حلويات جاهزة</h2>
        
        <div class="row">
            <div class="col-lg-8">
                <div class="row g-4" id="sweetsProducts"></div>
            </div>
            
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-shopping-cart"></i> سلة المشتريات</h5>
                    </div>
                    <div class="card-body">
                        <form id="orderForm">
                            <div class="mb-3">
                                <label class="form-label">الاسم الكامل</label>
                                <input type="text" class="form-control" id="customerName" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">رقم الهاتف</label>
                                <input type="tel" class="form-control" id="customerPhone" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">العنوان</label>
                                <textarea class="form-control" id="customerAddress" rows="2" required></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">تاريخ التسليم</label>
                                <input type="date" class="form-control" id="deliveryDate" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">ملاحظات</label>
                                <textarea class="form-control" id="notes" rows="2"></textarea>
                            </div>
                            
                            <hr>
                            <div id="cartItems"></div>
                            <hr>
                            <div class="d-flex justify-content-between">
                                <strong>الإجمالي:</strong>
                                <strong id="totalPrice">0 ر.س</strong>
                            </div>
                            <input type="hidden" id="cartData" value="[]">
                            
                            <button type="submit" class="btn btn-primary w-100 mt-3">
                                <i class="fas fa-check"></i> تأكيد الطلب
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cart = [];
        
        fetch('/api/products?category=sweets')
            .then(res => res.json())
            .then(products => {
                const container = document.getElementById('sweetsProducts');
                container.innerHTML = products.map(p => `
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100">
                            <div class="bg-light d-flex align-items-center justify-content-center" style="height:150px;">
                                <i class="fas fa-cookie text-muted" style="font-size:3rem;"></i>
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">${p.name}</h5>
                                <p class="card-text text-muted">${p.description}</p>
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="product-price">${p.price} ر.س</span>
                                </div>
                                <div class="input-group">
                                    <button class="btn btn-outline-secondary" onclick="updateQty(${p.id}, ${p.price}, -1)">-</button>
                                    <input type="number" class="form-control text-center" id="qty-${p.id}" value="0" min="0" readonly>
                                    <button class="btn btn-outline-secondary" onclick="updateQty(${p.id}, ${p.price}, 1)">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            });
        
        function updateQty(id, price, change) {
            const input = document.getElementById(`qty-${id}`);
            let qty = parseInt(input.value) + change;
            if (qty < 0) qty = 0;
            input.value = qty;
            
            const existing = cart.find(item => item.product_id === id);
            if (existing) {
                existing.quantity = qty;
                if (qty === 0) cart = cart.filter(item => item.product_id !== id);
            } else if (qty > 0) {
                cart.push({ product_id: id, quantity: qty, price: price });
            }
            
            updateCartDisplay();
        }
        
        function updateCartDisplay() {
            const container = document.getElementById('cartItems');
            let total = 0;
            
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="d-flex justify-content-between mb-2">
                        <span>صندوق × ${item.quantity}</span>
                        <span>${item.price * item.quantity} ر.س</span>
                    </div>
                `;
            }).join('');
            
            document.getElementById('totalPrice').textContent = total + ' ر.س';
            document.getElementById('cartData').value = JSON.stringify(cart);
        }
        
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (cart.length === 0) { alert('الرجاء اختيار منتج'); return; }
            
            let total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            const order = {
                customer_name: document.getElementById('customerName').value,
                customer_phone: document.getElementById('customerPhone').value,
                customer_address: document.getElementById('customerAddress').value,
                order_type: 'sweets',
                quantity: cart.reduce((sum, item) => sum + item.quantity, 0),
                total_price: total,
                delivery_date: document.getElementById('deliveryDate').value,
                notes: document.getElementById('notes').value,
                items: cart
            };
            
            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(order)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert('✅ تم تقديم طلبك بنجاح! رقم الطلب: ' + data.orderId);
                    window.location.href = '/';
                } else {
                    alert('حدث خطأ: ' + data.error);
                }
            } catch (err) {
                alert('حدث خطأ في الاتصال بالخادم');
            }
        });
    </script>
</body>
</html>
